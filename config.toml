[effects]
# Scale brightness based on power consumption
# Lower power = dimmer, higher power = brighter
enable_power_brightness = true

# Minimum brightness when idle (0.0 to 1.0)
min_brightness = 0.3

# Maximum brightness under load (0.0 to 1.0)
max_brightness = 1.0

# Enable pulsing effect when temperature exceeds threshold
enable_warning_pulse = true

# Temperature threshold for warning pulse (Celsius)
warning_temp_threshold = 70

# Pulsing speed in milliseconds (lower = faster pulse)
pulse_speed_ms = 500

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log to file (optional, comment out to disable)
# log_file = "/var/log/tt-qb-lights.log"
